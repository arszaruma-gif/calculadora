version: "3.8"

services:
  calculadora:
    image: ghcr.io/arszaruma-gif/calculadora:latest
    build:
      context: .
      dockerfile: Dockerfile
    networks:
      - traefik-public
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.calculadora.entrypoints=http"
        - "traefik.http.routers.calculadora.rule=Host(`calculadora.byronrm.com`)"
        - "traefik.http.middlewares.calculadora-https-redirect.redirectscheme.scheme=https"
        - "traefik.http.routers.calculadora.middlewares=calculadora-https-redirect"
        - "traefik.http.routers.calculadora-secure.entrypoints=https"
        - "traefik.http.routers.calculadora-secure.rule=Host(`calculadora.byronrm.com`)"
        - "traefik.http.routers.calculadora-secure.tls=true"
        - "traefik.http.routers.calculadora-secure.tls.certresolver=http"
        - "traefik.http.routers.calculadora-secure.service=calculadora"
        - "traefik.http.services.calculadora.loadbalancer.server.port=5000"
        - "traefik.docker.network=traefik-public"

networks:
  traefik-public:
    external: true
